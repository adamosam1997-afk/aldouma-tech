<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا - التقني الدومة</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        .contact-box {
            max-width: 500px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-box input,
        .contact-box textarea {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .contact-box input:focus,
        .contact-box textarea:focus {
            border-color: #25D366;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.3);
        }

        .btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1ebe5d;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">التقني الدومة</div>
</header>

<section class="section">

    <h2 class="section-title">تواصل معنا</h2>

    <div class="contact-box">

        <input type="text" id="name" placeholder="الاسم">

        <textarea rows="6" id="message" placeholder="اكتب رسالتك"></textarea>

        <button class="btn" onclick="sendToWhatsApp()">
            إرسال عبر واتساب
        </button>

    </div>

</section>

<footer>
    جميع الحقوق محفوظة © التقني الدومة
</footer>

<script>
    function sendToWhatsApp() {

        let name = document.getElementById("name").value;
        let message = document.getElementById("message").value;

        let phoneNumber = "249124975562";

        let text = `مرحباً، معك ${name}%0A%0A${message}`;

        let url = `https://wa.me/${phoneNumber}?text=${text}`;

        window.open(url, '_blank');
    }
</script>

</body>
</html>
