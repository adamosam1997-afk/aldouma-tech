<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: white;
        background-image: url('assets/images/Adam.jpg');
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
    }

    .section {
        background: rgba(255, 255, 255, 0.85);
        margin: 30px;
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(3px);
    }

    .contact-box {
        max-width: 500px;
        margin: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .contact-box input,
    .contact-box textarea {
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .contact-box input:focus,
    .contact-box textarea:focus {
        border-color: #25D366;
        box-shadow: 0 0 10px rgba(37, 211, 102, 0.3);
    }

    .btn {
        background: #25D366;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #1ebe5d;
        transform: translateY(-2px);
    }

    footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        background: rgba(255,255,255,0.8);
    }
</style>
